name: Update Data

on:
  schedule:
    - cron: "0 6 * * *"   # elke dag 06:00 UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # PYTHON
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # INSTALL DEPENDENCIES
      # =========================
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas requests lxml html5lib

      # =========================
      # 🔥 RUN SCRAPER (DB vullen)
      # =========================
      - name: Run scraper
        run: |
          echo "🔥 RUNNING SCRAPER"
          python pipeline/scraper.py

      # =========================
      # RUN EXPORT (CSV maken)
      # =========================
      - name: Run export pipeline
        run: |
          echo "📦 EXPORTING TO CSV"
          python pipeline/runner.py

      # =========================
      # DEBUG (OPTIONEEL MAAR HANDIG)
      # =========================
      - name: Show latest CSV info
        run: |
          echo "📊 CSV preview:"
          head -n 5 data/prices.csv || true

      # =========================
      # COMMIT DATA
      # =========================
      - name: Commit & push data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add data/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Auto update fund data"
            git push
          fi
