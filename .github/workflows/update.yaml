name: Update Data

on:
  schedule:
    - cron: "0 6 * * *"   # elke dag 06:00 UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # PYTHON
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # INSTALL DEPENDENCIES
      # =========================
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas requests lxml html5lib

      # =========================
      # 🔥 RUN SCRAPER (BELANGRIJK!)
      # =========================
      - name: Run scraper (update database)
        run: python pipeline/scraper.py

      # =========================
      # RUN EXPORT PIPELINE
      # =========================
      - name: Run export pipeline
        run: python pipeline/runner.py

      # =========================
      # COMMIT DATA
      # =========================
      - name: Commit & push data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add data/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Auto update fund data"
            git push
          fi
